server {
    listen 4100;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Security headers
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy strict-origin-when-cross-origin;

    # ESP-IDF compiler service (port 8760)
    location /compile {
        proxy_pass http://127.0.0.1:8760/compile;
        proxy_read_timeout 180s;
        proxy_send_timeout 180s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /health {
        proxy_pass http://127.0.0.1:8760/health;
        proxy_set_header Host $host;
    }

    # PlatformIO compiler service (port 8761) — Arduino + STM32Cube
    location /pio-compile {
        proxy_pass http://127.0.0.1:8761/compile;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /pio-health {
        proxy_pass http://127.0.0.1:8761/health;
        proxy_set_header Host $host;
    }

    # LVGL digital twin simulator service (port 8770)
    location /simulate-lvgl {
        proxy_pass http://127.0.0.1:8770/simulate-lvgl;
        proxy_read_timeout 180s;
        proxy_send_timeout 180s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /lvgl-sim-health {
        proxy_pass http://127.0.0.1:8770/health;
        proxy_set_header Host $host;
    }

    # SPA: all routes fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
