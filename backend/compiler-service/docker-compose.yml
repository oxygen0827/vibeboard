services:
  compiler:
    build: .
    image: esp32-compiler:latest
    container_name: esp32-compiler
    restart: unless-stopped
    ports:
      - "8760:8760"
    environment:
      BUILD_BASE: /tmp/builds
      REMOTE_OTA_DIR: /tmp/vibeboard-remote-ota
    volumes:
      - ${VIBEBOARD_BUILD_CACHE:-./.compiler-build-cache}:/tmp/builds
      - ${VIBEBOARD_REMOTE_OTA_STATE:-./.remote-ota-state}:/tmp/vibeboard-remote-ota
    # Compiler is CPU/memory heavy; limit resources.
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 4g

